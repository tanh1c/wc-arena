services:
  - type: web
    name: we-speak-football-agent
    runtime: python
    plan: free
    rootDir: agent-service
    buildCommand: pip install -e .
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.9"
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: MEM0_API_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: LLM_API_KEY
        sync: false
      - key: LLM_BASE_URL
        sync: false
      - key: LLM_MODEL
        sync: false
      - key: AGENT_ALLOWED_ORIGIN
        sync: false
